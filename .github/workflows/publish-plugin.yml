name: Build WrathCombo Plugin Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/publish-plugin.yml'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'WrathCombo/**'
      - '.gitmodules'

permissions:
  contents: read

env:
  DOTNET_VERSION: '10.x.x'
  PROJECT_PATH: 'WrathCombo/WrathCombo.csproj'

jobs:
  build-plugin:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: preview

      - name: Setup STG Dalamud
        shell: pwsh
        run: |
          $dalamudHome = Join-Path $env:APPDATA 'XIVLauncher\addon\Hooks\dev'
          curl.exe -L https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -o dalamud.zip
          New-Item -Path $dalamudHome -ItemType Directory -Force | Out-Null
          Expand-Archive -Force dalamud.zip -DestinationPath $dalamudHome

      - name: Restore
        run: dotnet restore $env:PROJECT_PATH

      - name: Build
        run: dotnet build $env:PROJECT_PATH -c Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Locate package output
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Filter latest.zip |
            Where-Object { $_.FullName -match 'WrathCombo' } |
            Select-Object -First 1

          if (-not $zip) {
            Write-Host 'No latest.zip was produced.'
            Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse | Select-Object FullName
            exit 1
          }

          Write-Host "Package: $($zip.FullName)"
          "PACKAGE_ZIP=$($zip.FullName)" >> $env:GITHUB_ENV

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: WrathCombo-package
          path: ${{ env.PACKAGE_ZIP }}
          if-no-files-found: error

      - name: Patch CN package metadata
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zipPath = $env:PACKAGE_ZIP
          $tempDir = Join-Path $env:RUNNER_TEMP 'WrathComboCN'
          if (Test-Path $tempDir) { Remove-Item $tempDir -Recurse -Force }
          [System.IO.Compression.ZipFile]::ExtractToDirectory($zipPath, $tempDir)

          $manifest = Get-ChildItem $tempDir -File -Filter *.json | Where-Object { $_.Name -notlike '*.deps.json' } | Select-Object -First 1
          if (-not $manifest) { throw 'Could not find plugin manifest in CN package.' }

          $manifestObject = Get-Content $manifest.FullName -Raw | ConvertFrom-Json
          $oldInternalName = [string]$manifestObject.InternalName
          $newInternalName = 'WrathComboCN'
          $manifestObject.Name = 'Wrath Combo CN'
          $manifestObject.InternalName = $newInternalName
          $manifestObject.RepoUrl = 'https://github.com/SumomoAkihime/WrathCombo'
          $manifestObject.Description = 'CN variant of Wrath Combo, packaged from the synced upstream source.'
          $manifestObject.Punchline = 'Wrath Combo CN build from synced upstream source.'

          $baseVersion = [string]$manifestObject.AssemblyVersion
          if ([string]::IsNullOrWhiteSpace($baseVersion)) {
            throw 'AssemblyVersion was not found in the packaged manifest.'
          }

          # Prefer upstream published version (puni source) when available, because
          # upstream repository code version can lag behind released package version.
          try {
            $upstreamRepo = Invoke-RestMethod -Uri 'https://love.puni.sh/ment.json' -Headers @{ 'User-Agent' = 'GitHub Actions' }
            $upstreamWrath = $upstreamRepo | Where-Object { $_.InternalName -eq 'WrathCombo' } | Select-Object -First 1
            $upstreamVersion = [string]$upstreamWrath.AssemblyVersion
            if (-not [string]::IsNullOrWhiteSpace($upstreamVersion)) {
              $baseVersion = $upstreamVersion
              Write-Host "Using upstream published version: $baseVersion"
            } else {
              Write-Host "Upstream published version missing, fallback to packaged version: $baseVersion"
            }
          } catch {
            Write-Host "Failed to query upstream published version, fallback to packaged version: $baseVersion"
          }

          $runNumber = [int]($env:GITHUB_RUN_NUMBER ?? '1')
          $cnSuffix = $runNumber % 1000
          if ($cnSuffix -le 0) {
            $cnSuffix = 1
          }
          $manifestObject.AssemblyVersion = "$baseVersion.$cnSuffix"

          $newManifestPath = Join-Path $tempDir "$newInternalName.json"
          $manifestObject | ConvertTo-Json -Depth 6 | Set-Content -Path $newManifestPath -Encoding UTF8
          if ($manifest.FullName -ne $newManifestPath -and (Test-Path $manifest.FullName)) {
            Remove-Item $manifest.FullName -Force
          }

          foreach ($suffix in @('.dll', '.deps.json', '.pdb')) {
            $oldPath = Join-Path $tempDir "$oldInternalName$suffix"
            $newPath = Join-Path $tempDir "$newInternalName$suffix"
            if ((Test-Path $oldPath) -and ($oldPath -ne $newPath)) {
              Move-Item -LiteralPath $oldPath -Destination $newPath -Force
            }
          }

          $newZipPath = Join-Path $env:RUNNER_TEMP 'WrathComboCN-latest.zip'
          if (Test-Path $newZipPath) { Remove-Item $newZipPath -Force }
          [System.IO.Compression.ZipFile]::CreateFromDirectory($tempDir, $newZipPath)
          "CN_PATCHED_ZIP=$newZipPath" >> $env:GITHUB_ENV

      - name: Upload CN package artifact
        uses: actions/upload-artifact@v4
        with:
          name: WrathComboCN-package
          path: ${{ env.CN_PATCHED_ZIP }}
          if-no-files-found: error
